<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Restaurant Menu</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

<h1>🍔 Demo Restaurant Menu</h1>

<div class="menu">

<div class="card">
<img src="https://images.unsplash.com/photo-1568901346375-23c9450c58cd">
<div class="food-info">
<h3>Chicken Burger</h3>
<p>£6</p>
<input type="number" id="burger" min="0" value="0">
</div>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1576107232684-1279f390859f">
<div class="food-info">
<h3>Fries</h3>
<p>£3</p>
<input type="number" id="fries" min="0" value="0">
</div>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1581636625402-29b2a704ef13">
<div class="food-info">
<h3>Coca Cola</h3>
<p>£2</p>
<input type="number" id="coke" min="0" value="0">
</div>
</div>

</div>

<h2>Customer Details</h2>

<input type="text" id="name" placeholder="Your Name">
<input type="text" id="phone" placeholder="Phone Number">

<h3>Delivery Option</h3>

<label>
<input type="radio" name="delivery" value="Pickup" checked onchange="toggleAddress()"> Pickup
</label>

<label>
<input type="radio" name="delivery" value="Delivery" onchange="toggleAddress()"> Deliver to Home
</label>

<div id="addressBox" style="display:none;">
<input type="text" id="address" placeholder="Delivery Address">
</div>

<button id="orderBtn" onclick="sendOrder()" disabled>Order via WhatsApp</button>

</div>

<script src="script.js"></script>

</body>
</html>
