<!DOCTYPE html>
<html>
<head>
<title>Restaurant Menu</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h1>My Restaurant</h1>

<div class="menu">

<div class="item">
<h3>Chicken Burger - £6</h3>
<input type="number" id="burger" value="0">
</div>

<div class="item">
<h3>Fries - £3</h3>
<input type="number" id="fries" value="0">
</div>

<div class="item">
<h3>Coke - £2</h3>
<input type="number" id="coke" value="0">
</div>

</div>

<h2>Customer Details</h2>

<input type="text" id="name" placeholder="Your Name">

<input type="text" id="phone" placeholder="Phone Number">

<br><br>

<button onclick="sendOrder()">Order via WhatsApp</button>

<script src="script.js"></script>

</body>
</html>
